<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <style>
        body { background: #f7f8fc; }
        .card-img-top{ height:200px; object-fit:cover; }
        .card-body{ display:flex; flex-direction:column; align-items:center; }
        .card-title{ min-height:3rem; font-size: medium;}
        .price{ font-weight:700; margin-top:auto; }
        .add-cart-btn{ width:100%; margin-top:0.75rem; }
        .cart-pill {
            position: relative;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-left: 0.5rem;
        }
        #cart-count {
            background: #0d6efd;
            color: white;
            border-radius: 50%;
            min-width: 1.25rem;
            height: 1.25rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            margin-left: 0.35rem;
            padding: 0 0.3rem;
        }
    </style>
</head>

<body>
    <header>
        <nav class="navbar navbar-expand navbar-light bg-light fixed-top py-3">
            <div class="container-fluid">
                <a class="navbar-brand fs-3 fw-bold" href="index.html">Navbar</a>
                <ul class="navbar-nav me-auto mt-2 mt-lg-0">
                    <li class="nav-item">
                        <a class="nav-link active" href="shop.html" aria-current="page"
                            >Shop
                            <span class="visually-hidden">(current)</span></a
                        >
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="cart.html">
                            Cart
                            <span class="cart-pill" aria-label="Cart items"><span id="cart-count">0</span></span>
                        </a>
                    </li>
                    <li class="nav-item dropdown">
                        <a
                            class="nav-link dropdown-toggle"
                            href="#"
                            id="dropdownId"
                            data-bs-toggle="dropdown"
                            aria-haspopup="true"
                            aria-expanded="false"
                            >More</a
                        >
                        <div class="dropdown-menu" aria-labelledby="dropdownId">
                            <a class="dropdown-item" href="about.html">About Us</a>
                            <a class="dropdown-item" href="contact.html">Contact Us</a>
                        </div>
                    </li>
                </ul>
                <form class="d-flex my-2 my-lg-0">
                    <input
                        class="form-control me-2 w-50"
                        type="text"
                        placeholder="Search the world's finest art materials"
                        style="min-width: 450px !important; width: 450px !important;"
                    />
                    <button class="btn btn-outline-primary my-2 my-sm-0" type="submit">
                        Search
                    </button>
                </form>
            </div>
        </nav>
    </header>

    <main>
        <h1 class=""></h1>
        <!-- Card Catalog -->
        <div class="container" style="margin-top: 100px;">
            <div class="row row-cols-1 row-cols-md-4 g-4">
                <div class="col-lg-10">
                    <div class="d-flex justify-content-start align-items-start mb-1">
                            <h2 class="fw-bold">Our Products</h2>
                    </div>
                </div>
                <div class="col-md-2 col-lg-3">
                    <div class="card h-100">
                        <img src="https://pyxis.nymag.com/v1/imgs/b3e/20a/ca7573d9ad7bf20cafe74b0bfb1dbf7b9d-3888-330-Supracolor-Aquarelle-box-o.rsquare.w600.jpg" 
                        title="Caran d’Ache Supracolor Metal Box Set of 30" class="card-img-top" alt="...">
                        <div class="card-body">
                            <h5 class="card-title text-start">Caran d’Ache Supracolor Metal Box Set of 30</h5>
                            <div class="price">$94.00</div>
                            <button class="btn btn-primary add-cart-btn mt-2" type="button" data-product-id="caran">Add to cart</button>
                        </div>
                    </div>
                </div>
                <div class="col-md-2 col-lg-3">
                    <div class="card h-100">
                        <img src="https://www.craftcarrot.com/cdn/shop/products/albdur36_grande.jpg?v=1478171937" 
                        title="Faber-Castell Albrecht Dürer Watercolor Pencils, 36 Colors" class="card-img-top" alt="...">
                        <div class="card-body">
                            <h5 class="card-title start">Faber-Castell Albrecht Dürer Watercolor Pencils, 36 Colors, Can</h5>
                            <div class="price">$59.00</div>
                            <button class="btn btn-primary add-cart-btn mt-2" type="button" data-product-id="faber">Add to cart</button>
                        </div>
                    </div>
                </div>
                <div class="col-md-2 col-lg-3">
                    <div class="card h-100">
                        <img src="https://pyxis.nymag.com/v1/imgs/4ba/adb/418ecbd4ee25c336e5a916a41ee0795add.rdeep-vertical.w245.jpg" 
                        title="Kitaboshi Pencils, Set of 12" class="card-img-top" alt="...">
                        <div class="card-body">
                            <h5 class="card-title text-start">Kitaboshi Pencils, Set of 12</h5>
                            <div class="price">$14.00</div>
                            <button class="btn btn-primary add-cart-btn mt-2" type="button" data-product-id="kitaboshi">Add to cart</button>
                        </div>
                    </div>
                </div>
                <div class="col-md-2 col-lg-3">
                    <div class="card h-100">
                        <img src="https://pyxis.nymag.com/v1/imgs/6db/937/5fc6550af8e67b33b2c39571847a8185a9.rdeep-vertical.w245.jpg"
                        title="Fabriano Set 24 Watercolor Pencils" class="card-img-top" alt="...">
                        <div class="card-body">
                            <h5 class="card-title text-start">Fabriano Set 24 Watercolor Pencils</h5>
                            <div class="price">$51.00</div>
                            <button class="btn btn-primary add-cart-btn mt-2" type="button" data-product-id="fabriano">Add to cart</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
     <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
     <script src="cart.js"></script>

</body>
</html>
