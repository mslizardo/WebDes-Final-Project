<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <nav class="navbar navbar-expand navbar-light bg-light fixed-top py-3">
            <div class="container-fluid">
                <a class="navbar-brand fs-3 fw-bold" href="index.html">Canvas & Co.</a>
                <ul class="navbar-nav me-auto mt-2 mt-lg-0">
                    <li class="nav-item">
                        <a class="nav-link" href="shop.html">Shop
                            <span class="visually-hidden">(current)</span></a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="cart.html" aria-current="page">
                            Cart
                            <span class="cart-pill" aria-label="Cart items"><span id="cart-count">0</span></span>
                        </a>
                    </li>
                    <li class="nav-item dropdown">
                        <a
                            class="nav-link dropdown-toggle"
                            href="#"
                            id="dropdownId"
                            data-bs-toggle="dropdown"
                            aria-haspopup="true"
                            aria-expanded="false"
                            >More</a
                        >
                        <div class="dropdown-menu" aria-labelledby="dropdownId">
                            <a class="dropdown-item" href="about.html">About Us</a>
                            <a class="dropdown-item" href="contact.html">Contact Us</a>
                        </div>
                    </li>
                </ul>
                <form class="d-flex my-2 my-lg-0" data-search-form>
                    <input
                        class="form-control me-2 w-50"
                        type="text"
                        placeholder="Search the world's finest art materials"
                        style="min-width: 450px !important; width: 450px !important;"
                        data-search-input
                    />
                    <button class="btn btn-outline-primary my-2 my-sm-0" type="submit">
                        Search
                    </button>
                </form>
            </div>
        </nav>
    </header>

    <main>
        <div class="container cart-page">
            <div class="row g-4">
                <div class="col-lg-8">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <h2 class="fw-bold">Your Cart</h2>
                        <a href="shop.html" class="btn btn-outline-primary btn-sm">Continue shopping</a>
                    </div>
                    <div id="cart-empty" class="text-center py-5 bg-white rounded-4 shadow-sm d-none">
                        <h4 class="fw-bold">Your cart is empty</h4>
                        <p class="text-muted">Add a few supplies and they’ll appear here.</p>
                        <a href="shop.html" class="btn btn-primary">Browse products</a>
                    </div>
                    <div id="cart-items" class="d-flex flex-column gap-3"></div>
                </div>
                <div class="col-lg-4">
                    <div class="card summary-card p-4">
                        <h4 class="fw-bold mb-3">Order summary</h4>
                        <div class="d-flex justify-content-between mb-2">
                            <span class="text-muted">Subtotal</span>
                            <span id="cart-subtotal">$0.00</span>
                        </div>
                        <div class="d-flex justify-content-between mb-3">
                            <span class="text-muted">Estimated total</span>
                            <span id="cart-total" class="fw-bold">$0.00</span>
                        </div>
                        <button class="btn btn-primary w-100" id="checkout-btn" disabled>Checkout</button>
                    </div>
                </div>
            </div>
        </div>
    </main>
     <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
     <script src="cart.js"></script>
     <script src="search.js"></script>

</body>
</html>
